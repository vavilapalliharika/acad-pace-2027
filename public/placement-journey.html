<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Placement Journey · RISE 2027</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--gd:#0D3D2E;--gm:#1B5E45;--ga:#2D8C6A;--mb:#EEF7F3;--wh:#fff;--td:#0D1F1A;--tm:#2E5045;--tu:#7A9E90;--bd:#D4EBE0;--am:#F59E0B;--gn:#22C55E}
  body{font-family:'Inter',sans-serif;background:var(--mb);color:var(--td);min-height:100vh;display:flex}
  .sidebar{width:260px;background:var(--gd);min-height:100vh;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
  .sb-brand{padding:28px 24px 20px;font-size:22px;font-weight:800;color:#fff}
  .sb-home-link{margin:0 12px 8px;display:flex;padding:9px 14px;border-radius:9px;color:rgba(255,255,255,0.5);font-size:13px;text-decoration:none}
  .sb-profile{margin:0 16px 24px;background:var(--gm);border-radius:12px;padding:16px}
  .sb-name{font-size:16px;font-weight:700;color:#fff;margin-bottom:8px}
  .sb-badge{display:inline-block;background:rgba(255,255,255,0.15);color:#fff;font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px}
  .nav-section{padding:0 12px;flex:1}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;color:rgba(255,255,255,0.65);font-size:14px;font-weight:500;margin-bottom:2px;text-decoration:none}
  .nav-item:hover,.nav-item.active{background:rgba(255,255,255,0.12);color:#fff}
  .nav-item .nic{width:20px;text-align:center}
  .sb-footer{padding:16px;border-top:1px solid rgba(255,255,255,0.08);margin-top:auto;font-size:11px;color:rgba(255,255,255,0.35);text-align:center}
  .main{flex:1;padding:32px;overflow-y:auto;max-width:1000px}
  .page-title{font-size:28px;font-weight:800;color:var(--gd);margin-bottom:4px}
  .page-sub{font-size:13px;color:var(--tu);margin-bottom:24px}
  .back-link{display:inline-block;font-size:12px;font-weight:700;color:var(--ga);text-decoration:none;margin-bottom:16px}
  .pj-widget-wrap{background:var(--wh);border:1px solid var(--bd);border-radius:18px;padding:22px 24px}
  .pj-widget-header{font-size:20px;font-weight:800;color:var(--gd);margin-bottom:20px}
  .pj-stepper{display:flex;align-items:flex-start;padding:8px 4px 20px;overflow-x:auto;margin-bottom:18px}
  .pj-step-node{display:flex;flex-direction:column;align-items:center;min-width:108px;flex-shrink:0;text-align:center}
  .pj-node-circle{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px;border:3px solid var(--bd);background:#fff}
  .pj-node-circle.current{background:#fffbeb;border-color:var(--am);box-shadow:0 0 0 4px rgba(245,158,11,0.2),0 0 20px rgba(245,158,11,0.25);animation:pjGlow 2s ease-in-out infinite}
  @keyframes pjGlow{0%,100%{box-shadow:0 0 0 4px rgba(245,158,11,0.2),0 0 16px rgba(245,158,11,0.2)}50%{box-shadow:0 0 0 6px rgba(245,158,11,0.28),0 0 28px rgba(245,158,11,0.35)}}
  .pj-node-circle.locked{background:#f3f4f6;border-color:#e5e7eb;opacity:.75}
  .pj-node-circle.completed{background:#dcfce7;border-color:var(--gn);color:var(--gn)}
  .pj-node-title{font-size:11px;font-weight:800;color:var(--gd);line-height:1.3;margin-bottom:6px;max-width:100px}
  .pj-step-node.locked .pj-node-title{color:var(--tu)}
  .pj-node-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:10px;line-height:1.3;max-width:104px}
  .pj-badge-warning{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
  .pj-badge-locked{background:#f3f4f6;color:#9ca3af}
  .pj-connector{flex:1;min-width:24px;height:3px;background:var(--bd);margin-top:24px;border-radius:2px}
  .pj-summary{background:linear-gradient(135deg,#f0faf5,var(--mb));border:1px solid var(--bd);border-radius:14px;padding:16px 18px;margin-bottom:18px}
  .pj-summary-title{font-size:13px;font-weight:800;color:var(--gd);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px}
  .pj-summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
  .pj-sum-lbl{font-size:10px;font-weight:700;color:var(--tu);text-transform:uppercase}
  .pj-sum-val{font-size:13px;font-weight:800;color:var(--gd)}
  .pj-sum-warn{color:#c2410c}
  .pj-summary-bar-wrap{display:flex;align-items:center;gap:12px}
  .pj-summary-bar{flex:1;height:8px;background:var(--bd);border-radius:4px;overflow:hidden}
  .pj-summary-fill{height:100%;background:linear-gradient(90deg,var(--ga),var(--am));transition:width 1s ease}
  .pj-summary-pct{font-size:14px;font-weight:800;color:var(--gd)}
  .pj-assess-section{background:linear-gradient(180deg,#fff,var(--mb));border:1px solid var(--bd);border-radius:14px;padding:18px}
  .pj-assess-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .pj-assess-title{font-size:16px;font-weight:800;color:var(--gd)}
  .pj-assess-badge{font-size:10px;font-weight:800;padding:5px 12px;border-radius:20px}
  .pj-ab-not-cleared{background:#fee2e2;color:#dc2626}
  .pj-metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .pj-metric-card{background:#fff;border:1px solid var(--bd);border-radius:14px;padding:16px;text-align:center}
  .pj-metric-label{font-size:11px;font-weight:700;color:var(--tu);text-transform:uppercase;margin-bottom:10px}
  .pj-metric-score{font-size:20px;font-weight:800;color:var(--gd)}
  .pj-metric-score span{font-size:13px;color:var(--tu)}
</style>
</head>
<body>
<script src="/rise-nav.js"></script>
<script src="/placement-journey.js"></script>
<script>riseAuthGate();</script>

<aside class="sidebar">
  <div class="sb-brand">RISE 2027</div>
  <a href="/" target="_top" class="sb-home-link">← Home</a>
  <div class="sb-profile"><div class="sb-name">Ananya Rao</div><span class="sb-badge">🟡 Intermediate · Level 3</span></div>
  <nav class="nav-section" id="rise-nav"></nav>
  <div class="sb-footer">RISE 2027 · YOG Batch</div>
</aside>

<main class="main">
  <a href="/dashboard" target="_top" class="back-link">← Back to Dashboard</a>
  <div class="page-title">🎯 Placement Journey</div>
  <div class="page-sub">Visual placement progression and assessment performance.</div>
  <div class="pj-widget-wrap" id="journey-page"></div>
</main>

<script>
renderRiseNav('dashboard', 'rise-nav');
document.getElementById('journey-page').innerHTML =
  '<div class="pj-widget-header">🎯 Placement Journey</div>' + renderFullJourneyPage();
setTimeout(() => {
  document.querySelectorAll('.pj-summary-fill').forEach(b => b.style.width = b.dataset.w);
}, 300);
</script>
</body>
</html>
