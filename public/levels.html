<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Levels · PACE 2027</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/pace-theme.css">
<link rel="stylesheet" href="/pace-legacy-bridge.css">
<link rel="stylesheet" href="/pace-pages.css">
</head>
<body>
<script src="/pace-logo.js"></script>
<script src="/rise-nav.js"></script>
<script src="/placement-engine.js"></script>
<script src="/pace-shell.js"></script>
<aside class="sidebar" style="display:none" aria-hidden="true"></aside>
<main class="main">
  <div class="pace-page-title">◈ Levels</div>
  <div class="pace-page-sub">Battle-pass progression — clear levels, earn XP, unlock placement perks and salary brackets.</div>

  <div class="pace-section-label">Progress Overview</div>
  <div class="lvl-ov-grid" id="overview-grid"></div>

  <div class="pace-section-label">Level Progress</div>
  <div class="lvl-prog-card" id="progress-card"></div>

  <div class="pace-section-label">Level History</div>
  <div class="lvl-hist-card" id="history-card"></div>

  <div class="pace-section-label">Locked Levels</div>
  <div class="lvl-locked-card" id="locked-card"></div>

  <div class="pace-section-label">All Levels & Package Mapping</div>
  <div class="lvl-grid" id="levels-grid"></div>
</main>

<script>
wrapPaceMain();
initPaceShell('levels');

const STUDENT = { score: 2140, avgPerDay: 37, xpEarned: 2140 };
const LEVELS = [
  { n: 1, name: 'Foundation',   threshold: 500,  package: 'Up to 6 LPA',  clearedOn: 'May 22, 2026', unlocks: 'Daily mission tracking, profile badge.' },
  { n: 2, name: 'Builder',      threshold: 1000, package: '6 – 8 LPA',    clearedOn: 'Jun 04, 2026', unlocks: 'GitHub auto-sync, weekly leaderboard.' },
  { n: 3, name: 'Intermediate', threshold: 1800, package: '8 – 12 LPA',   clearedOn: 'Jun 18, 2026', unlocks: 'Mentor 1:1, advanced DSA tracks.' },
  { n: 4, name: 'Advanced',     threshold: 2800, package: '12 – 18 LPA',  unlocks: 'Unlimited AI mocks, recruiter visibility.' },
  { n: 5, name: 'Elite',        threshold: 4000, package: '18 LPA+',      unlocks: 'Priority referrals, mock placement drives.' }
];

let prevCleared = true;
const states = LEVELS.map(l => {
  const s = STUDENT.score >= l.threshold ? 'cleared' : (prevCleared ? 'progress' : 'locked');
  prevCleared = (s === 'cleared');
  return s;
});
const cleared = states.filter(s => s === 'cleared').length;
const currentLevel = Math.min(cleared + 1, 5);
const currentL = LEVELS[currentLevel - 1];
const prevThresh = currentLevel > 1 ? LEVELS[currentLevel - 2].threshold : 0;
const needed = Math.max(0, currentL.threshold - STUDENT.score);
const etaDays = STUDENT.avgPerDay > 0 ? Math.ceil(needed / STUDENT.avgPerDay) : '—';
const pct = currentLevel <= cleared ? 100 : Math.round(((STUDENT.score - prevThresh) / (currentL.threshold - prevThresh)) * 100);

document.getElementById('overview-grid').innerHTML = `
  <div class="lvl-ov-card"><div class="lvl-ov-lbl">Current Level</div><div class="lvl-ov-val">L${currentLevel}</div></div>
  <div class="lvl-ov-card"><div class="lvl-ov-lbl">Total Levels</div><div class="lvl-ov-val">5</div></div>
  <div class="lvl-ov-card"><div class="lvl-ov-lbl">XP Earned</div><div class="lvl-ov-val">${STUDENT.xpEarned.toLocaleString()}</div></div>
  <div class="lvl-ov-card"><div class="lvl-ov-lbl">Target Package</div><div class="lvl-ov-val" style="font-size:18px">${currentL.package}</div></div>`;

document.getElementById('progress-card').innerHTML = `
  <div class="lvl-prog-head">
    <span style="font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase">Level ${currentLevel} · ${currentL.name}</span>
    <span class="lvl-prog-pct">${pct}%</span>
  </div>
  <span class="lvl-pkg">${currentL.package}</span>
  <div class="lvl-prog-bar"><div class="lvl-prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="lvl-prog-foot">${needed === 0 ? '🏆 Level cleared!' : `~${etaDays} days to next level · ${needed.toLocaleString()} XP remaining · +${STUDENT.avgPerDay} XP/day avg`}</div>`;

document.getElementById('history-card').innerHTML = LEVELS.filter((_, i) => states[i] === 'cleared').map(l => `
  <div class="lvl-hist-item">
    <div class="lvl-hist-badge">L${l.n}</div>
    <div style="flex:1">
      <div class="lvl-hist-name">Level ${l.n} · ${l.name}</div>
      <div class="lvl-hist-date">Unlocked ${l.clearedOn} · ${l.package} · ${l.threshold.toLocaleString()} XP</div>
    </div>
    <span style="font-size:12px;font-weight:700;color:var(--accent-green)">✔ Cleared</span>
  </div>`).join('');

document.getElementById('locked-card').innerHTML = LEVELS.filter((_, i) => states[i] === 'locked').map(l => `
  <div class="lvl-locked-item">
    <div class="lvl-locked-name">🔒 Level ${l.n} · ${l.name}</div>
    <div class="lvl-locked-req">
      <b>Package:</b> ${l.package}<br>
      <b>Requirements:</b> ${l.threshold.toLocaleString()} XP · Clear Level ${l.n - 1} first<br>
      <b>Unlocks:</b> ${l.unlocks}
    </div>
  </div>`).join('') || '<div style="color:var(--accent-green);font-weight:700;padding:12px">No locked levels — you cleared them all!</div>';

document.getElementById('levels-grid').innerHTML = LEVELS.map((l, i) => {
  const st = states[i];
  const badge = st === 'cleared' ? 'CLEARED ✅' : (st === 'progress' ? 'IN PROGRESS 🔄' : 'LOCKED 🔒');
  const prevT = i > 0 ? LEVELS[i - 1].threshold : 0;
  const pctW = st === 'cleared' ? 100 : st === 'progress' ? Math.max(2, Math.min(100, ((STUDENT.score - prevT) / (l.threshold - prevT)) * 100)) : 0;
  const foot = st === 'cleared' ? `✓ Cleared on ${l.clearedOn}` : st === 'progress' ? `⚡ ${(l.threshold - STUDENT.score).toLocaleString()} XP to go` : `🔒 Clear Level ${l.n - 1} to unlock`;
  return `<div class="lvl-card ${st}">
    <div class="lvl-head">
      <div>
        <div class="lvl-name">Level ${l.n} · ${l.name}</div>
        <span class="lvl-pkg">${l.package}</span>
      </div>
      <span class="lvl-badge ${st}">${badge}</span>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:6px">${STUDENT.score.toLocaleString()} / ${l.threshold.toLocaleString()} XP</div>
    <div class="lvl-bar"><div class="lvl-fill" style="width:0%" data-w="${pctW}"></div></div>
    <div class="lvl-foot">${foot}</div>
  </div>`;
}).join('');

setTimeout(() => {
  document.getElementById('prog-fill').style.width = pct + '%';
  document.querySelectorAll('.lvl-fill').forEach(b => { b.style.width = b.dataset.w + '%'; });
}, 150);
</script>
</body>
</html>
