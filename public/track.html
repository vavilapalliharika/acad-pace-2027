// ── persistent submit-link state ──
const STORE_KEY = 'rise_track_subs_v1';
let SUBS = {};
try { SUBS = JSON.parse(localStorage.getItem(STORE_KEY) || '{}'); } catch(e){}
function saveSubs(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(SUBS)); }catch(e){} }
window.submitLink = function(id){
  const inp = document.getElementById('inp-' + id);
  const v = inp ? inp.value.trim() : '';
  if(!v){ if(inp) inp.focus(); return; }
  if(!/^https?:\/\//i.test(v)){ alert('Paste a valid URL starting with http(s)://'); return; }
  SUBS[id] = v; saveSubs(); renderCurrent();
};
function subCell(id){
  const v = SUBS[id];
  if(v){
    return `<div class="proj-sub"><a class="sub-link" href="${v.replace(/"/g,'&quot;')}" target="_blank" rel="noopener">✅ Submitted · View ↗</a></div>`;
  }
  return `<div class="proj-sub">
    <input id="inp-${id}" class="sub-input" type="url" placeholder="🔗 Paste submission link" />
    <button class="sub-btn" onclick="submitLink('${id}')">Submit</button>
  </div>`;
}

function fileUploadRow(id, label, accept) {
  const v = SUBS[id];
  if (v) {
    if (v.indexOf('uploaded:') === 0) {
      return `<div class="proj-sub"><span class="sub-link">✅ Uploaded · ${v.replace('uploaded:','')}</span></div>`;
    }
    return `<div class="proj-sub"><a class="sub-link" href="${v.replace(/"/g,'&quot;')}" target="_blank" rel="noopener">✅ Uploaded · View ↗</a></div>`;
  }
  return `<div class="proj-sub proj-sub-file">
    <input id="file-${id}" type="file" class="sub-file" accept="${accept || '.pdf,.png,.jpg,.jpeg'}" onchange="uploadTrackFile('${id}')" />
    <span class="muted" style="font-size:11px">or paste certificate / badge URL</span>
    <input id="inp-${id}" class="sub-input" type="url" placeholder="🔗 Certificate / badge URL" />
    <button class="sub-btn" onclick="submitLink('${id}')">Submit</button>
  </div>`;
}

window.uploadTrackFile = function(id) {
  var inp = document.getElementById('file-' + id);
  if (!inp || !inp.files || !inp.files[0]) return;
  SUBS[id] = 'uploaded:' + inp.files[0].name;
  saveSubs();
  renderCurrent();
};

function aiProjectName(p){ return typeof p === 'string' ? p : p.name; }
function aiProjectPts(p){ return typeof p === 'object' && p.pts ? p.pts : 0; }

function aiTierState(){
  const shipped = AI_TIERS.map(t => t.projects.filter((_,i) => SUBS['ai|'+t.key+'|'+i]).length);
  let unlockedThrough = 0;
  for(let i=0;i<AI_TIERS.length;i++){ if(i===0 || shipped[i-1]===3) unlockedThrough = i; else break; }
  return { shipped, unlockedThrough };
}

function aiOverviewRoadmapHtml(){
  const s = aiTierState();
  const subtitles = [
    'Prompt engineering & first AI apps',
    'RAG, agents & production apps',
    'Multi-agent systems & automation'
  ];
  const totalShipped = s.shipped.reduce(function(a,b){ return a + b; }, 0);
  const parts = [];
  AI_TIERS.forEach(function(t, i){
    if(i > 0) parts.push('<div class="tr-arrow" aria-hidden="true">→</div>');
    const done = s.shipped[i] === 3;
    const unlocked = i <= s.unlockedThrough;
    const cls = done ? 'done' : (unlocked ? 'current' : 'locked');
    const badge = done ? '✓ Complete' : (unlocked ? s.shipped[i] + '/3 shipped' : '🔒 Locked');
    const projs = t.projects.map(function(p, j){
      const submitted = !!SUBS['ai|' + t.key + '|' + j];
      const pts = aiProjectPts(p);
      return '<li class="tr-proj' + (submitted ? ' shipped' : '') + '">' + (submitted ? '✓' : '○') + ' ' + aiProjectName(p) + ' <span class="tr-proj-pts">+' + pts + ' pts</span></li>';
    }).join('');
    const dots = [0,1,2].map(function(j){
      return '<span class="tr-dot' + (j < s.shipped[i] ? ' on' : '') + '"></span>';
    }).join('');
    parts.push(
      '<div class="tr-step ' + cls + '">' +
      '<div class="tr-step-num">Tier ' + (i+1) + '</div>' +
      '<div class="tr-step-icon">' + t.icon + '</div>' +
      '<div class="tr-step-name">' + t.name + '</div>' +
      '<div class="tr-step-sub">' + subtitles[i] + '</div>' +
      '<span class="tr-step-badge">' + badge + '</span>' +
      '<ul class="tr-proj-list">' + projs + '</ul>' +
      '<div class="tr-dots">' + dots + '</div></div>'
    );
  });
  return (
    '<div class="tr-hero">' +
    '<div class="tr-hero-main"><h3>AI Explorer → AI Builder → AI Innovator</h3>' +
    '<p>Ship <strong>9 projects</strong> across 3 tiers — from prompt engineering to multi-agent systems.</p></div>' +
    '<div class="tr-hero-stat"><div class="tr-hero-val">' + totalShipped + '<span>/9</span></div>' +
    '<div class="tr-hero-lbl">Projects shipped</div></div></div>' +
    '<div class="tr-quote">"Don\'t just use AI — build with it. Every project shipped is a step closer to becoming an AI Innovator."</div>' +
    '<div class="tr-roadmap">' + parts.join('') + '</div>' +
    '<div class="tr-rule"><span>1</span> Finish all 3 projects in a tier' +
    '<span class="tr-rule-arrow">→</span><span>2</span> Unlock next tier' +
    '<span class="tr-rule-arrow">→</span><span>3</span> Earn AI Innovator badge</div>'
  );
}

function aiTiersHtml(){
  const s = aiTierState();
  return AI_TIERS.map((t,i) => {
    const done = s.shipped[i] === 3;
    const unlocked = i <= s.unlockedThrough;
    const cls = done ? 'done' : (unlocked ? 'current' : 'locked');
    const lock = !unlocked;
    const stat = done ? `✓ ${s.shipped[i]}/3 shipped · Badge earned`
              : unlocked ? `⚡ ${s.shipped[i]}/3 projects shipped`
              : `🔒 Locked · Clear Tier ${i} first`;
    const projs = t.projects.map((p,idx) => {
      const id = 'ai|'+t.key+'|'+idx;
      const pts = aiProjectPts(p);
      const submitted = !!SUBS[id];
      const ptsPill = submitted
        ? '<span class="pill gn">+' + pts + ' pts earned</span>'
        : '<span class="pill am">+' + pts + ' pts on ship</span>';
      const sub = lock
        ? `<div class="proj-sub"><span class="sub-placeholder">🔒 Tier locked · ${pts} pts when unlocked</span></div>`
        : subCell(id);
      return `<div class="proj-row">
        <div class="proj-head"><div class="proj-name">${aiProjectName(p)}</div>${ptsPill}</div>
        ${sub}
      </div>`;
    }).join('');
    return `<div class="tier ${cls}">
      <div class="tier-head">
        <div>
          <div class="tier-lbl">Tier ${i+1} ${lock?'🔒':''}</div>
          <div class="tier-name">${t.icon} ${t.name}</div>
        </div>
        <div class="tier-stat">${stat}</div>
      </div>
      ${projs}
    </div>`;
  }).join('');
}

  { id:'be', name:'Backend deploy',  hint:'Render / Railway / Fly URL' },
  { id:'fs', name:'Full-stack deploy', hint:'Live product URL' }
];

function panelsFor(key){
  if(key === 'ai'){
    return {
      'Overview': aiOverviewRoadmapHtml(),
      'Tiers & Projects': aiTiersHtml(),
      'Skills & Resources': `
        <div class="card">
          <h3>Skills you'll build</h3>
          <div class="skill-row">
            ${['LLM','Agentic','RAG','DSA','MCP','Prompt Engineering'].map(s=>`<span class="pill">${s}</span>`).join('')}
          </div>
        </div>
        <div class="card">
          <h3>Course Resources</h3>
          <p>Curated CCBP courses for AI builders — open both in new tabs.</p>
          <a class="btn-primary" href="#" onclick="window.open('https://learning.ccbp.in/course?c_id=b9811b34-585b-47e0-a0be-65f1081a74f2','_blank');window.open('https://learning.ccbp.in/course?c_id=0ab1a0a2-ddf1-4b96-885a-b065a8db4483','_blank');return false;">📚 Open Course Resources</a>
        </div>`,
      'Eligible Companies': eligibleCompaniesHtml(AI_COMPANIES)
    };
  }
  if(key === 'dsa'){
    const potd = [
      { platform:'LeetCode', title:'Find the Duplicate Number', diff:'medium', topics:['Array','Binary Search'], url:'https://leetcode.com/problems/find-the-duplicate-number/' },
      { platform:'CodeChef', title:'Chef and Binary String', diff:'medium', topics:['Strings','Greedy'], url:'#' },
      { platform:'Codeforces', title:'Watermelon', diff:'easy', topics:['Math'], url:'https://codeforces.com/problemset/problem/4/A' }
    ];
    const aiRec = [
      { title:'Longest Substring Without Repeating Characters', diff:'medium', topics:['Sliding Window'], reason:'Weak topic: Strings' },
      { title:'Coin Change II', diff:'medium', topics:['DP'], reason:'Level 3 DP gap' },
      { title:'Number of Islands', diff:'medium', topics:['Graphs','BFS'], reason:'Past OA pattern' }
    ];
    const recent = [
      { title:'Valid Parentheses', diff:'easy', date:'Jun 20', solved:true },
      { title:'Merge Two Sorted Lists', diff:'easy', date:'Jun 19', solved:true },
      { title:'Subarray Sum Equals K', diff:'medium', date:'Jun 18', solved:false },
      { title:'LRU Cache', diff:'hard', date:'Jun 17', solved:false }
    ];
    const topics = ['Arrays','Strings','Linked Lists','Trees','Graphs','DP','Greedy','Binary Search','Backtracking'];
    const qpCard = (p, showReason) => `<div class="qp-card">
      ${showReason ? `<span class="pill am">${p.reason}</span>` : `<span class="pill">${p.platform||p.date}</span>`}
      <div class="qp-title">${p.title}</div>
      <div>${(p.topics||[]).map(t=>`<span class="qp-tag topic">${t}</span>`).join('')}<span class="qp-tag ${p.diff}">${p.diff}</span></div>
      ${p.url ? `<a class="qp-link" href="${p.url}" target="_blank" rel="noopener">Solve ↗</a>` : `<span class="muted">${p.solved?'✓ Solved':'○ Unsolved'}</span>`}
    </div>`;
    return {
      'Overview': dsaOverviewRoadmapHtml(),
      'Question Pool': `
        <div class="card">
          <h3>Problem of the Day</h3>
          <p class="muted" style="margin-bottom:14px">LeetCode · CodeChef · Codeforces — today's curated problems.</p>
          <div class="qp-grid">${potd.map(p=>qpCard(p)).join('')}</div>
        </div>
        <div class="card">
          <h3>AI Recommended Questions</h3>
          <p class="muted" style="margin-bottom:14px">Based on weak topics, current level, and past performance.</p>
          <div class="qp-grid">${aiRec.map(p=>qpCard(p,true)).join('')}</div>
        </div>
        <div class="card">
          <h3>Recent Questions — Last 7 Days</h3>
          <div class="qp-grid">${recent.map(p=>qpCard(p)).join('')}</div>
        </div>
        <div class="card">
          <h3>Topic Practice</h3>
          <div class="topic-grid">${topics.map(t=>`<button class="topic-btn">${t}</button>`).join('')}</div>
        </div>`,
      'Practice': `
        <div class="card">
          <h3>Daily point targets</h3>
          <div class="stat-grid">
            <div class="stat-box"><div class="l">Easy</div><div class="v">10 pts</div><div class="s">per problem</div></div>
            <div class="stat-box"><div class="l">Medium</div><div class="v">25 pts</div><div class="s">per problem</div></div>
            <div class="stat-box"><div class="l">Hard</div><div class="v">40 pts</div><div class="s">per problem</div></div>
            <div class="stat-box"><div class="l">Contest</div><div class="v">100 pts</div><div class="s">per contest</div></div>
          </div>
        </div>
        <div class="card">
          <h3>Streak tracker</h3>
          <div class="stat-grid">
            <div class="stat-box"><div class="l">Current streak</div><div class="v">12 🔥</div><div class="s">days</div></div>
            <div class="stat-box"><div class="l">Longest streak</div><div class="v">21</div><div class="s">days</div></div>
            <div class="stat-box"><div class="l">Solved this week</div><div class="v">18</div><div class="s">problems</div></div>
            <div class="stat-box"><div class="l">Total solved</div><div class="v">147</div><div class="s">/ 200 goal</div></div>
          </div>
        </div>`,
      'Eligible Companies': eligibleCompaniesHtml(DSA_COMPANIES)
    };
  }
  if(key === 'oss'){
    return {
      'Overview': ossOverviewHtml(),
      'Contributions': `
        <div class="card">
          <h3>Your GitHub</h3>
          <div class="proj-row">
            <div class="proj-head"><div class="proj-name">GitHub profile URL</div></div>
            ${subCell('oss|github')}
          </div>
        </div>
        <div class="card">
          <h3>Submit a contribution</h3>
          ${[1,2,3,4].map(i => `
            <div class="proj-row">
              <div class="proj-head"><div class="proj-name">Contribution #${i}</div><span class="pill am">5 pts</span></div>
              ${subCell('oss|pr|'+i)}
            </div>`).join('')}
        </div>`,
      'Submissions': submissionsHtml('oss', { projectPts: 300 }),
      'Eligible Companies': eligibleCompaniesHtml(OSS_COMPANIES)
    };
  }
  if(key === 'aptitude'){
    return {
      'Schedule': `
        <div class="card">
          <h3>Bi-weekly schedule</h3>
          <table class="tbl">
            <thead><tr><th>Track</th><th>Cadence</th><th>Next session</th></tr></thead>
            <tbody>
              <tr><td>Aptitude</td><td>Bi-weekly</td><td>Mon · 7:00 PM</td></tr>
              <tr><td>Verbal</td><td>Bi-weekly</td><td>Wed · 7:00 PM</td></tr>
              <tr><td>Group Discussion</td><td>Bi-weekly</td><td>Sat · 11:00 AM</td></tr>
            </tbody>
          </table>
        </div>`,
      'Mock OA': comingSoonHtml('Mock OA — Coming Soon', 'Aptitude & GD mock online assessments with timed sections, accuracy tracking, and OA-style scoring will launch here soon.'),
      'Submissions': submissionsHtml('aptitude', { projectPts: 100 }),
      'Eligible Companies': eligibleCompaniesHtml(APT_COMPANIES)
    };
  }
  if(key === 'dev'){
    return {
      'Overview': `
        <div class="card">
          <h3>Stack & Goal</h3>
          <p>You'll build full-stack products on <b>React · Node · MongoDB</b>. The track is structured around shipping three deployments — frontend, backend, and a complete full-stack product.</p>
          <div class="skill-row">
            ${['React','Node.js','Express','MongoDB','REST APIs','Deployment'].map(s=>`<span class="pill">${s}</span>`).join('')}
          </div>
        </div>`,
      'Milestones': `
        <div class="card">
          <h3>Deployment milestones</h3>
          ${DEV_MILESTONES.map(m => `
            <div class="proj-row">
              <div class="proj-head"><div class="proj-name">${m.name}</div><span class="muted">${m.hint}</span></div>
              ${subCell('dev|'+m.id)}
            </div>`).join('')}
        </div>`,
      'System Design': comingSoonHtml('System Design — Coming Soon', 'Weekly design problems, walkthroughs, and peer-reviewed design doc submissions are on the way.'),
      'Submissions': submissionsHtml('dev', { projectPts: 350 }),
      'Eligible Companies': eligibleCompaniesHtml(DEV_COMPANIES)
    };
  }
  return {};
}

let activeTab = T.tabs[0];

function renderCurrent(){
  const panels = panelsFor(KEY);
  document.getElementById('main').innerHTML = `
    <div class="page-title">${T.icon.replace(/</g,'&lt;').replace(/>/g,'&gt;')} ${T.title}</div>
    <div class="page-sub">${T.sub}</div>
    <div class="tabs" id="tabs">
      ${T.tabs.map(t => `<button class="tab ${t===activeTab?'active':''}" onclick="setTab('${t.replace(/'/g,"\\'")}')">${t}</button>`).join('')}
    </div>
    ${T.tabs.map(t => `<div class="tab-panel ${t===activeTab?'active':''}">${panels[t] || '<div class="card"><p class="muted">Coming soon.</p></div>'}</div>`).join('')}
  `;
}
window.setTab = function(t){ activeTab = t; renderCurrent(); };
renderCurrent();
</script>
</body>
</html>
