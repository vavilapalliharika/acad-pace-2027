<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in · PACE 2027</title>
<link rel="stylesheet" href="/pace-brand.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #12091f;
    --bg-elevated: #1a1028;
    --bg-card: rgba(255, 255, 255, 0.06);
    --primary: #8b5cf6;
    --primary-hover: #a78bfa;
    --secondary: #c4b5fd;
    --accent-amber: #fbbf24;
    --light: rgba(139, 92, 246, 0.16);
    --text: #f1f5f9;
    --text-bright: #ffffff;
    --muted: #b8b0c8;
    --border: rgba(255, 255, 255, 0.1);
    --radius: 20px;
    --shadow-lg: 0 24px 56px rgba(0, 0, 0, 0.45);
    --shadow-glow: 0 0 48px rgba(139, 92, 246, 0.22);
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 55% 45% at 15% 20%, rgba(139, 92, 246, 0.12), transparent 55%),
      radial-gradient(ellipse 50% 40% at 85% 80%, rgba(124, 58, 237, 0.1), transparent 50%),
      linear-gradient(165deg, #1a0f2e 0%, #12091f 50%, #0f0818 100%);
    animation: glow 12s ease-in-out infinite alternate;
  }
  @keyframes glow {
    0% { opacity: 0.75; }
    100% { opacity: 1; }
  }
  .grid-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.18;
    background-image:
      linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 45%, black, transparent);
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 36px 32px;
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    position: relative;
    z-index: 1;
    animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .brand-wrap { margin-bottom: 8px; }
  .sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 28px;
    line-height: 1.5;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 8px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  input {
    width: 100%;
    padding: 13px 15px;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    background: rgba(255, 255, 255, 0.04);
    color: var(--text);
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
  }
  input::placeholder { color: rgba(148, 163, 184, 0.6); }
  input:focus {
    border-color: rgba(139, 92, 246, 0.5);
    background: rgba(139, 92, 246, 0.08);
    box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
  }
  .field { margin-bottom: 16px; }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--primary), #6d28d9);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    box-shadow: 0 8px 24px rgba(139, 92, 246, 0.35);
  }
  button:hover {
    background: linear-gradient(135deg, var(--primary-hover), #7c3aed);
    transform: translateY(-2px);
    box-shadow: var(--shadow-glow);
  }
  button:active { transform: translateY(0); }
  .err {
    font-size: 12px;
    color: #f87171;
    margin-top: 12px;
    display: none;
    font-weight: 600;
  }
  .hint {
    margin-top: 22px;
    padding: 14px 16px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px dashed rgba(139, 92, 246, 0.3);
    border-radius: 12px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.65;
  }
  .hint b { color: var(--text-bright); }
  .back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 18px;
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .back:hover { color: var(--primary); }
</style>
</head>
<body>
<div class="grid-bg" aria-hidden="true"></div>
<form class="card" onsubmit="return doLogin(event)">
  <div class="brand-wrap" id="login-logo"></div>
  <div class="sub">Sign in to your dashboard</div>
  <div class="field">
    <label for="email">Email</label>
    <input id="email" type="text" autocomplete="username" placeholder="student@rise2027.com" required>
  </div>
  <div class="field">
    <label for="pwd">Password</label>
    <input id="pwd" type="password" autocomplete="current-password" placeholder="••••••••" required>
  </div>
  <button type="submit">Sign in →</button>
  <div class="err" id="err">Invalid email or password.</div>
  <div class="hint">
    <b>Demo credentials</b><br>
    Email: <b>student@rise2027.com</b><br>
    Password: <b>rise2027</b>
  </div>
  <a href="/" target="_top" class="back">← Back to home</a>
</form>
<script src="/pace-logo.js"></script>
<script>
  if (typeof renderPaceLogo === 'function') {
    document.getElementById('login-logo').innerHTML = renderPaceLogo({ stack: true, href: '/', elaboration: false });
  }
  function getNext(){
    var p = new URLSearchParams(location.search);
    var n = p.get('next');
    return n && n.startsWith('/') ? n : '/dashboard';
  }
  function doLogin(e){
    e.preventDefault();
    var em = document.getElementById('email').value.trim().toLowerCase();
    var pw = document.getElementById('pwd').value;
    if (
      (em === 'student@rise2027.com' ||
        em === 'harika' ||
        em === 'harika.vavilapalli' ||
        em === 'ananya') &&
      pw === 'rise2027'
    ) {
      sessionStorage.setItem(
        'rise_user',
        JSON.stringify({
          name: 'Harika Vavilapalli',
          email: em,
          level: 40,
          badge: 'YOG',
          batch: '2027 YOG',
          eligibleTier: 'Type B',
          eligibleRange: '8–12 LPA',
        })
      );
      window.top.location.replace(getNext());
    } else {
      document.getElementById('err').style.display = 'block';
    }
    return false;
  }
  if(!sessionStorage.getItem('rise_user')){
    document.getElementById('email').value = 'student@rise2027.com';
  } else {
    window.top.location.replace(getNext());
  }
</script>
</body>
</html>
