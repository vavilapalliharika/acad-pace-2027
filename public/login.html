<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in · PACE 2027</title>
<link rel="stylesheet" href="/pace-brand.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--pace-font-body);
    background: var(--pace-bg-light);
    color: var(--pace-text-dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 55% 45% at 20% 25%, rgba(0, 46, 255, 0.08), transparent 55%),
      radial-gradient(ellipse 50% 40% at 80% 75%, rgba(48, 201, 195, 0.06), transparent 50%),
      var(--pace-bg-light);
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--pace-bg-white);
    border: 1px solid var(--pace-border-light);
    border-radius: 28px;
    padding: 40px 36px;
    box-shadow: var(--neu-raised-lg);
    position: relative;
    z-index: 1;
    animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .login-title {
    font-size: 28px;
    font-weight: 800;
    color: var(--pace-text-dark);
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .brand-wrap { margin-bottom: 4px; }
  .sub {
    font-size: 14px;
    color: var(--pace-muted);
    margin-bottom: 28px;
    line-height: 1.5;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--pace-muted);
    margin-bottom: 8px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  input {
    width: 100%;
    padding: 14px 4px;
    border: none;
    border-bottom: 2px solid var(--pace-border);
    border-radius: 0;
    font-size: 15px;
    font-family: inherit;
    background: transparent;
    color: var(--pace-text-dark);
    outline: none;
    transition: border-color 0.25s;
  }
  input::placeholder { color: #9ca3af; }
  input:focus { border-bottom-color: var(--pace-primary); }
  .field { margin-bottom: 22px; }
  button[type="submit"] {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: var(--pace-radius-pill);
    background: var(--pace-gradient-cta);
    color: #fff;
    font-weight: 700;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    margin-top: 12px;
    box-shadow: var(--neu-glow);
    transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
  }
  button[type="submit"]:hover {
    transform: translateY(-2px);
    box-shadow: var(--neu-glow-strong);
    background: var(--pace-primary-hover);
  }
  .err {
    font-size: 12px;
    color: #ef4444;
    margin-top: 12px;
    display: none;
    font-weight: 600;
  }
  .hint {
    margin-top: 24px;
    padding: 16px;
    background: var(--pace-bg-subtle);
    border: 1px solid var(--pace-border-light);
    border-radius: var(--pace-radius-sm);
    font-size: 12px;
    color: var(--pace-text-muted);
    line-height: 1.65;
  }
  .hint b { color: var(--pace-text-dark); }
  .back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 18px;
    font-size: 13px;
    color: var(--pace-muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .back:hover { color: var(--pace-primary); }
</style>
</head>
<body>
<form class="card" onsubmit="return doLogin(event)">
  <div class="brand-wrap" id="login-logo"></div>
  <div class="login-title">Login</div>
  <div class="sub">Sign in to your dashboard</div>
  <div class="field">
    <label for="email">Email</label>
    <input id="email" type="text" autocomplete="username" placeholder="student@pace2027.com" required>
  </div>
  <div class="field">
    <label for="pwd">Password</label>
    <input id="pwd" type="password" autocomplete="current-password" placeholder="••••••••" required>
  </div>
  <button type="submit">Sign in →</button>
  <div class="err" id="err">Invalid email or password.</div>
  <div class="hint">
    <b>PACE 2027 · Demo credentials</b><br>
    Email: <b>student@pace2027.com</b><br>
    Password: <b>pace2027</b>
  </div>
  <a href="/" target="_top" class="back">← Back to home</a>
</form>
<script src="/pace-logo.js"></script>
<script src="/pace-nav.js"></script>
<script>
  if (typeof renderPaceLogo === 'function') {
    document.getElementById('login-logo').innerHTML = renderPaceLogo({ stack: true, href: '/', elaboration: false });
  }
  function getNext(){
    var p = new URLSearchParams(location.search);
    var n = p.get('next');
    return n && n.startsWith('/') ? n : '/dashboard';
  }
  function doLogin(e){
    e.preventDefault();
    var em = document.getElementById('email').value.trim().toLowerCase();
    var pw = document.getElementById('pwd').value;
    var demoEmail = (window.PACE_DEMO_EMAIL || 'student@pace2027.com').toLowerCase();
    var demoPw = window.PACE_DEMO_PASSWORD || 'pace2027';
    if (
      (em === demoEmail ||
        em === 'harika' ||
        em === 'harika.vavilapalli' ||
        em === 'ananya') &&
      pw === demoPw
    ) {
      sessionStorage.setItem(
        window.PACE_SESSION_KEY || 'pace_user',
        JSON.stringify({
          name: 'Harika Vavilapalli',
          email: demoEmail,
          level: 40,
          badge: 'YOG',
          batch: '2027 YOG',
          eligibleTier: 'Pro',
          eligibleRange: '8–12 LPA',
        })
      );
      sessionStorage.removeItem('rise_user');
      window.top.location.replace(getNext());
    } else {
      document.getElementById('err').style.display = 'block';
    }
    return false;
  }
  if(typeof migratePaceSession === 'function') migratePaceSession();
  if(!getPaceSessionRaw || !getPaceSessionRaw()){
    document.getElementById('email').value = window.PACE_DEMO_EMAIL || 'student@pace2027.com';
  } else {
    window.top.location.replace(getNext());
  }
</script>
</body>
</html>
